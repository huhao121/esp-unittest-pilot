# host 单测的 CI：每次 push 和开/更新 PR 都自动跑一遍。
name: host-tests

on:
  push:          # 任何分支 push 都触发
  pull_request:  # 开 PR 或往 PR 推新提交都触发

jobs:
  host-tests:
    runs-on: ubuntu-latest
    # 直接用 Espressif 官方镜像，版本锁死成和本地一样的 5.5.2（别用 latest）。
    container: espressif/idf:v5.5.2

    steps:
      # 1) 把仓库代码拉到容器里。
      - uses: actions/checkout@v4

      # 2) 跑和本地一模一样的脚本。脚本里测试失败会返回非 0，这一步就会红。
      - name: 跑 host 单测
        shell: bash
        run: ./ci/run_host_tests.sh
